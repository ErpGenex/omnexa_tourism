{% extends "templates/web.html" %}

{% block title %}Tourism Online Booking{% endblock %}

{% block page_content %}
<div class="container py-4">
  <h2 class="mb-3">Tourism Online Booking</h2>
  <p class="text-muted mb-4">Submit your request for flight tickets, hotel stays, beach or restaurant services. Our team will confirm availability and pricing.</p>

  <div class="card">
    <div class="card-body">
      <form id="tourism-online-form">
        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Request Type</label>
            <select class="form-control" name="request_type" required>
              <option value="Hotel">Hotel</option>
              <option value="Flight Ticket">Flight Ticket</option>
              <option value="Beach">Beach</option>
              <option value="Restaurant">Restaurant</option>
              <option value="Activity">Activity</option>
            </select>
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Company</label>
            <input class="form-control" name="company" placeholder="Company" required />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Branch</label>
            <input class="form-control" name="branch" placeholder="Branch" required />
          </div>
        </div>

        <hr class="my-3" />

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Name</label>
            <input class="form-control" name="customer_name" required />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" name="email" type="email" required />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">Phone</label>
            <input class="form-control" name="phone" />
          </div>
        </div>

        <div id="flight-fields" style="display:none;">
          <div class="row">
            <div class="col-md-3 mb-3">
              <label class="form-label">From (Airport)</label>
              <input class="form-control" name="from_airport" />
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label">To (Airport)</label>
              <input class="form-control" name="to_airport" />
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label">Departure</label>
              <input class="form-control" name="departure_datetime" type="datetime-local" />
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label">Return</label>
              <input class="form-control" name="return_datetime" type="datetime-local" />
            </div>
          </div>
          <div class="row">
            <div class="col-md-3 mb-3">
              <label class="form-label">Trip Type</label>
              <select class="form-control" name="trip_type">
                <option value="One-way">One-way</option>
                <option value="Round-trip">Round-trip</option>
              </select>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label">Cabin</label>
              <select class="form-control" name="cabin_class">
                <option value="Economy">Economy</option>
                <option value="Premium Economy">Premium Economy</option>
                <option value="Business">Business</option>
                <option value="First">First</option>
              </select>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label">Passengers</label>
              <input class="form-control" name="passengers" type="number" min="1" value="1" />
            </div>
          </div>
        </div>

        <div id="hotel-fields" style="display:none;">
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Hotel (optional)</label>
            <select class="form-control" name="hotel"></select>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Room Unit (required for Hotel)</label>
              <select class="form-control" name="room_unit"></select>
            </div>
            <div class="col-md-2 mb-3">
              <label class="form-label">Check In</label>
              <input class="form-control" name="check_in_date" type="date" />
            </div>
            <div class="col-md-2 mb-3">
              <label class="form-label">Check Out</label>
              <input class="form-control" name="check_out_date" type="date" />
            </div>
          </div>
        </div>

        <div id="service-fields" style="display:none;">
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Location / Facility</label>
              <input class="form-control" name="location" placeholder="Location note (optional)" />
            </div>
            <div class="col-md-4 mb-3" id="restaurant-venue-wrap">
              <label class="form-label">Restaurant Venue</label>
              <select class="form-control" name="restaurant_venue"></select>
            </div>
            <div class="col-md-4 mb-3" id="beach-facility-wrap">
              <label class="form-label">Beach Facility</label>
              <select class="form-control" name="beach_facility"></select>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Service Date/Time</label>
              <input class="form-control" name="service_datetime" type="datetime-local" />
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Party Size</label>
              <input class="form-control" name="party_size" type="number" min="1" value="2" />
            </div>
          </div>
        </div>
        <div class="mb-3" id="slot-availability-box" style="display:none;"></div>

        <div id="activity-fields" style="display:none;">
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">Activity Name</label>
              <input class="form-control" name="activity_name" />
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Activity Date</label>
              <input class="form-control" name="activity_date" type="date" />
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">Participants</label>
              <input class="form-control" name="participants" type="number" min="1" value="1" />
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Notes</label>
          <textarea class="form-control" name="notes" rows="3"></textarea>
        </div>

        <button class="btn btn-primary" type="submit">Submit Request</button>
        <div class="mt-3" id="tourism-online-result"></div>
      </form>
    </div>
  </div>
</div>

<script>
  (function() {
    const form = document.getElementById("tourism-online-form");
    const typeEl = form.querySelector("[name=request_type]");
    const flightFields = document.getElementById("flight-fields");
    const hotelFields = document.getElementById("hotel-fields");
    const serviceFields = document.getElementById("service-fields");
    const activityFields = document.getElementById("activity-fields");
    const result = document.getElementById("tourism-online-result");
    const companyEl = form.querySelector("[name=company]");
    const branchEl = form.querySelector("[name=branch]");
    const checkInEl = form.querySelector("[name=check_in_date]");
    const checkOutEl = form.querySelector("[name=check_out_date]");
    const hotelSelect = form.querySelector("[name=hotel]");
    const roomSelect = form.querySelector("[name=room_unit]");
    const restaurantSelect = form.querySelector("[name=restaurant_venue]");
    const beachSelect = form.querySelector("[name=beach_facility]");
    const serviceDatetimeEl = form.querySelector("[name=service_datetime]");
    const restaurantVenueWrap = document.getElementById("restaurant-venue-wrap");
    const beachFacilityWrap = document.getElementById("beach-facility-wrap");
    const slotAvailabilityBox = document.getElementById("slot-availability-box");

    function toggleFields() {
      const t = typeEl.value;
      flightFields.style.display = (t === "Flight Ticket") ? "" : "none";
      hotelFields.style.display = (t === "Hotel") ? "" : "none";
      serviceFields.style.display = (t === "Beach" || t === "Restaurant") ? "" : "none";
      activityFields.style.display = (t === "Activity") ? "" : "none";
      restaurantVenueWrap.style.display = (t === "Restaurant") ? "" : "none";
      beachFacilityWrap.style.display = (t === "Beach") ? "" : "none";
      slotAvailabilityBox.style.display = (t === "Beach" || t === "Restaurant") ? "" : "none";
      if (!(t === "Beach" || t === "Restaurant")) {
        slotAvailabilityBox.innerHTML = "";
      }
    }
    toggleFields();
    typeEl.addEventListener("change", toggleFields);

    function formToObject(f) {
      const fd = new FormData(f);
      const obj = {};
      for (const [k, v] of fd.entries()) {
        obj[k] = v;
      }
      obj.source = "Website";
      return obj;
    }

    function setOptions(selectEl, rows, labelKey) {
      const html = ['<option value=""></option>'].concat(
        (rows || []).map(r => `<option value="${frappe.utils.escape_html(r.name)}">${frappe.utils.escape_html(r[labelKey] || r.name)}</option>`)
      );
      selectEl.innerHTML = html.join("");
    }

    async function refreshOptions() {
      if (!companyEl.value || !branchEl.value) {
        return;
      }
      const r = await frappe.call({
        method: "omnexa_tourism.omnexa_tourism.doctype.tourism_online_booking_request.tourism_online_booking_request.get_online_booking_options",
        args: {
          company: companyEl.value,
          branch: branchEl.value,
          check_in_date: checkInEl.value,
          check_out_date: checkOutEl.value
        }
      });
      const msg = r.message || {};
      setOptions(hotelSelect, msg.hotels, "hotel_name");
      setOptions(roomSelect, msg.rooms, "unit_name");
      setOptions(restaurantSelect, msg.restaurants, "venue_name");
      setOptions(beachSelect, msg.beaches, "facility_name");
    }

    async function refreshSlotUsage() {
      const t = typeEl.value;
      if (!(t === "Beach" || t === "Restaurant") || !companyEl.value || !branchEl.value || !serviceDatetimeEl.value) {
        slotAvailabilityBox.innerHTML = "";
        return;
      }

      const resource = t === "Restaurant" ? restaurantSelect.value : beachSelect.value;
      if (!resource) {
        slotAvailabilityBox.innerHTML = "";
        return;
      }

      const r = await frappe.call({
        method: "omnexa_tourism.omnexa_tourism.doctype.tourism_online_booking_request.tourism_online_booking_request.get_slot_usage",
        args: {
          company: companyEl.value,
          branch: branchEl.value,
          doctype_name: t === "Restaurant" ? "Tourism Restaurant Reservation" : "Tourism Beach Booking",
          resource_name: resource,
          service_datetime: serviceDatetimeEl.value
        }
      });
      const msg = r.message || {};
      const cls = (msg.available || 0) > 0 ? "alert-info" : "alert-danger";
      slotAvailabilityBox.innerHTML = `<div class="alert ${cls} mb-0">Capacity: <b>${msg.capacity || 0}</b> | Used: <b>${msg.used || 0}</b> | Available: <b>${msg.available || 0}</b></div>`;
    }

    [companyEl, branchEl, checkInEl, checkOutEl].forEach(el => {
      el.addEventListener("change", () => refreshOptions());
      el.addEventListener("blur", () => refreshOptions());
    });
    [typeEl, restaurantSelect, beachSelect, serviceDatetimeEl].forEach(el => {
      el.addEventListener("change", () => refreshSlotUsage());
      el.addEventListener("blur", () => refreshSlotUsage());
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      result.innerHTML = "";
      const payload = formToObject(form);
      try {
        const r = await frappe.call({
          method: "omnexa_tourism.omnexa_tourism.doctype.tourism_online_booking_request.tourism_online_booking_request.submit_online_request",
          args: { payload }
        });
        const msg = r.message || {};
        result.innerHTML = `<div class="alert alert-success">Request submitted. Reference: <b>${msg.name}</b></div>`;
        form.reset();
        toggleFields();
        refreshOptions();
        refreshSlotUsage();
      } catch (err) {
        const m = (err && err.message) ? err.message : "Failed to submit request.";
        result.innerHTML = `<div class="alert alert-danger">${m}</div>`;
      }
    });
    refreshOptions();
    refreshSlotUsage();
  })();
</script>
{% endblock %}
