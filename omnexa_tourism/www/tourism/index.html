---
no_breadcrumbs: 1
full_width: 1
no_header: 1
---

{% extends "templates/web.html" %}

{% block head_include %}
{{ super() }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
{% endblock %}

{% block title %}Omnexa Tourism | السياحة{% endblock %}

{% block page_content %}
<div class="tourism-site tourism-premium" data-page="home">
  <header class="tourism-header" id="tourism-header"></header>
  <section class="tourism-hero tourism-hero-premium" id="tourism-hero"></section>
  <div class="tourism-value-bar" id="tourism-trust-strip"></div>
  <section class="tourism-section tourism-reveal" id="tourism-destinations-section"></section>
  <section class="tourism-section tourism-section-alt tourism-reveal" id="tourism-services-section"></section>
  <section class="tourism-stats tourism-reveal" id="tourism-stats"></section>
  <section class="tourism-cta-band tourism-reveal" id="tourism-cta-band"></section>
  <footer class="tourism-footer" id="tourism-footer"></footer>
</div>
<script>
  (function () {
    function boot() {
      if (window.TourismSite) window.TourismSite.init("home");
    }
    if (typeof frappe !== "undefined" && frappe.ready) frappe.ready(boot);
    else if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", boot);
    else boot();
  })();
</script>
{% endblock %}
